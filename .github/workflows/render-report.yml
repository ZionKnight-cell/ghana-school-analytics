name: Render RMarkdown Report

on:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install R packages
        run: |
          install.packages(c("tidyverse", "rmarkdown", "knitr", "WDI"))
        shell: Rscript {0}

      - name: Render report
        run: |
          rmarkdown::render("reports/ghana_education_report.Rmd",
                            output_dir = "outputs")
        shell: Rscript {0}

      - name: Commit rendered report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add outputs/
          git diff --staged --quiet || git commit -m "Auto-render report [skip ci]"
          git push